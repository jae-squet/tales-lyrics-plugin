# .github/workflows/build-whisper.yml
#
# Builds libwhisper.so for Android arm64-v8a and x86_64 from whisper.cpp source,
# then uploads both to the existing GitHub release as additional assets.
#
# Trigger: manually via Actions tab (workflow_dispatch), or push a tag like
# "lyrics-plugin-v1.0.4" to also rebuild the release automatically.

name: Build libwhisper.so for Android

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. lyrics-plugin-v1.0.3)'
        required: true
        default: 'lyrics-plugin-v1.0.3'
      whisper_ref:
        description: 'whisper.cpp git ref to build from (tag, branch, or commit)'
        required: true
        default: 'v1.7.1'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/whisper.cpp
          ref: ${{ github.event.inputs.whisper_ref }}

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;26.1.10909125" --sdk_root=$ANDROID_SDK_ROOT

      - name: Configure CMake
        run: |
          mkdir build-${{ matrix.abi }}
          cmake -S . -B build-${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_SDK_ROOT/ndk/26.1.10909125/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-${{ matrix.abi }} --config Release -j$(nproc)

      - name: Locate libwhisper.so
        id: find_so
        run: |
          SO=$(find build-${{ matrix.abi }} -name "libwhisper.so" | head -1)
          echo "so_path=$SO" >> $GITHUB_OUTPUT
          echo "Found: $SO"
          ls -lh "$SO"

      - name: Upload libwhisper.so as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: ${{ steps.find_so.outputs.so_path }}
          # Renames the asset to include the ABI so both don't clash
          # Result: libwhisper_arm64-v8a.so and libwhisper_x86_64.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  repack:
    # After both ABI builds finish, download each ABI's existing zip,
    # inject libwhisper.so into it, and re-upload.
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            tag_suffix: arm64
            so_asset: libwhisper_arm64-v8a.so
          - abi: x86_64
            tag_suffix: x86_64
            so_asset: libwhisper_x86_64.so

    steps:
      - name: Download existing release zip
        run: |
          gh release download ${{ github.event.inputs.tag }} \
            --pattern "lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip" \
            --repo ${{ github.repository }}
          ls -lh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download libwhisper.so for this ABI
        run: |
          gh release download ${{ github.event.inputs.tag }} \
            --pattern "${{ matrix.so_asset }}" \
            --repo ${{ github.repository }}
          # Rename to the canonical name the app expects
          mv "${{ matrix.so_asset }}" libwhisper.so
          ls -lh libwhisper.so
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject libwhisper.so into zip
        run: |
          ZIP="lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip"
          # Add/replace libwhisper.so at the root of the zip
          zip -j "$ZIP" libwhisper.so
          echo "Updated zip contents:"
          unzip -l "$ZIP"

      - name: Update manifest to layout=split
        run: |
          ZIP="lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip"
          # Extract existing manifest, update layout field, re-inject
          unzip -p "$ZIP" plugin_manifest.json > plugin_manifest.json 2>/dev/null || \
            echo '{"version":"1.0.3","model":"base"}' > plugin_manifest.json
          # Use python (always available on ubuntu) to update the JSON safely
          python3 - <<'EOF'
          import json, sys
          with open("plugin_manifest.json") as f:
              m = json.load(f)
          m["layout"] = "split"
          m["abi"] = "${{ matrix.abi }}"
          with open("plugin_manifest.json", "w") as f:
              json.dump(m, f, indent=2)
          print("Updated manifest:", m)
          EOF
          zip -j "$ZIP" plugin_manifest.json
          echo "Final zip contents:"
          unzip -l "$ZIP"

      - name: Re-upload updated zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
