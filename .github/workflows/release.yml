# .github/workflows/build-whisper.yml
#
# Builds all required native libraries for Android from whisper.cpp source:
#   - libggml-base.so
#   - libggml-cpu.so
#   - libggml.so
#   - libwhisper.so
#
# Then injects them into the existing release zips alongside libwhisper_jni.so.
# Load order in WhisperPlugin.kt must be:
#   libggml-base.so → libggml-cpu.so → libggml.so → libwhisper.so → libwhisper_jni.so

name: Build libwhisper.so for Android

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. lyrics-plugin-v1.0.3)'
        required: true
        default: 'lyrics-plugin-v1.0.3'
      whisper_ref:
        description: 'whisper.cpp git ref to build from (tag, branch, or commit)'
        required: true
        default: 'v1.7.1'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/whisper.cpp
          ref: ${{ github.event.inputs.whisper_ref }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;26.1.10909125" --sdk_root=$ANDROID_SDK_ROOT

      - name: Configure CMake
        run: |
          mkdir build-${{ matrix.abi }}
          cmake -S . -B build-${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_SDK_ROOT/ndk/26.1.10909125/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-${{ matrix.abi }} --config Release -j$(nproc)

      - name: List all built .so files
        run: |
          echo "All .so files produced:"
          find build-${{ matrix.abi }} -name "*.so" | sort
          echo ""
          echo "Sizes:"
          find build-${{ matrix.abi }} -name "*.so" -exec ls -lh {} \;

      - name: Collect all required .so files
        run: |
          REQUIRED="libggml-base.so libggml-cpu.so libggml.so libwhisper.so"
          ALL_FOUND=true
          for LIB in $REQUIRED; do
            SO=$(find build-${{ matrix.abi }} -name "$LIB" | head -1)
            if [ -z "$SO" ]; then
              echo "ERROR: $LIB not found in build output!"
              ALL_FOUND=false
            else
              echo "Found $LIB at $SO ($(du -h $SO | cut -f1))"
              cp "$SO" "$LIB"
            fi
          done
          if [ "$ALL_FOUND" = false ]; then
            echo ""
            echo "Build output was:"
            find build-${{ matrix.abi }} -name "*.so"
            exit 1
          fi

      - name: Upload all .so files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-libs-${{ matrix.abi }}
          path: |
            libggml-base.so
            libggml-cpu.so
            libggml.so
            libwhisper.so

  repack:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            tag_suffix: arm64
          - abi: x86_64
            tag_suffix: x86_64

    steps:
      - name: Download built .so artifacts
        uses: actions/download-artifact@v4
        with:
          name: whisper-libs-${{ matrix.abi }}

      - name: Verify downloaded .so files
        run: |
          echo "Downloaded libraries:"
          ls -lh *.so
          REQUIRED="libggml-base.so libggml-cpu.so libggml.so libwhisper.so"
          for LIB in $REQUIRED; do
            if [ ! -f "$LIB" ]; then
              echo "ERROR: $LIB missing from artifacts!"
              exit 1
            fi
          done
          echo "All required libraries present."

      - name: Download existing release zip
        run: |
          gh release download "${{ github.event.inputs.tag }}" \
            --pattern "lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip" \
            --repo "${{ github.repository }}"
          echo "Original zip contents:"
          unzip -l "lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject all .so files into zip
        run: |
          ZIP="lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip"
          zip -j "$ZIP" \
            libggml-base.so \
            libggml-cpu.so \
            libggml.so \
            libwhisper.so
          echo "Zip contents after injection:"
          unzip -l "$ZIP"

      - name: Update manifest to layout=split
        run: |
          ZIP="lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip"
          unzip -p "$ZIP" plugin_manifest.json > plugin_manifest.json 2>/dev/null || \
            echo '{"version":"1.0.3","model":"base"}' > plugin_manifest.json
          python3 - <<'EOF'
          import json
          with open("plugin_manifest.json") as f:
              m = json.load(f)
          m["layout"] = "split"
          m["abi"] = "${{ matrix.abi }}"
          m["libs"] = ["libggml-base.so", "libggml-cpu.so", "libggml.so", "libwhisper.so"]
          with open("plugin_manifest.json", "w") as f:
              json.dump(m, f, indent=2)
          print("Updated manifest:")
          print(json.dumps(m, indent=2))
          EOF
          zip -j "$ZIP" plugin_manifest.json
          echo "Final zip contents:"
          unzip -l "$ZIP"

      - name: Delete old zip asset from release
        run: |
          gh release delete-asset "${{ github.event.inputs.tag }}" \
            "lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip" \
            --repo "${{ github.repository }}" \
            --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload updated zip to release
        run: |
          gh release upload "${{ github.event.inputs.tag }}" \
            "lyrics_plugin_v1_${{ matrix.tag_suffix }}.zip" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify final release assets
        run: |
          echo "Final release assets:"
          gh release view "${{ github.event.inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[] | "\(.name) - \(.size) bytes"'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
